display_information:
  name: GymLog
  description: Log gym workouts and get weight recommendations via DM
  background_color: "#1a1a2e"
features:
  app_home:
    messages_tab_enabled: true
    messages_tab_read_only_enabled: false
  bot_user:
    display_name: GymLog
    always_online: true
oauth_config:
  scopes:
    bot:
      - chat:write
      - files:write
      - im:history
      - im:read
      - im:write
settings:
  event_subscriptions:
    bot_events:
      - message.im
  interactivity:
    is_enabled: true
  org_deploy_enabled: false
  socket_mode_enabled: true
  token_rotation_enabled: false
